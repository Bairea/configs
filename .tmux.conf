# ==========================
# General Settings
# ==========================

# Enable mouse support (clickable windows, panes, resizable panes)
set -g mouse on

# Set default terminal mode to 256color mode
set -g default-terminal "screen-256color"

# Increase history limit (default is 2000)
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# ==========================
# Tmux 3.6 New Features
# ==========================

# Enable pane scrollbars
set -g pane-scrollbars on

# Set scrollbar position (options: right, left)
set -g pane-scrollbars-position right

# ================================================
# Copy to System Clipboard (Requires xclip)
# ================================================

# Bind mouse drag end event to copy selection to system clipboard
# This works for both standard mode and vi mode

# For standard mode
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# For vi mode
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Allow applications to set the clipboard
set -s set-clipboard on
