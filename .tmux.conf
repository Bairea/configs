# ==========================
# Tmux Configuration
# ==========================

# ==========================
# General Settings
# ==========================

# Enable mouse support (clickable windows, panes, resizable panes)
set -g mouse on

# Set default terminal mode to 256color mode
set -g default-terminal "tmux-256color"

# Terminal color overrides
set -as terminal-overrides ",xterm-256color:Tc"

# Escape time (faster key response)
set -s escape-time 0

# Increase history limit (default is 2000)
set -g history-limit 50000

# Display time for status messages (ms)
set -g display-time 4000

# Status line refresh interval (seconds)
set -g status-interval 5

# Focus events enabled
set -g focus-events on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# ==========================
# Tmux 3.6+ New Features
# ==========================

# Enable pane scrollbars
set -g pane-scrollbars on

# Set scrollbar position (options: right, left)
set -g pane-scrollbars-position right

# ==========================
# Copy to System Clipboard
# ==========================

# Allow applications to set the clipboard
set -s set-clipboard on

# Bind mouse drag end event to copy selection to system clipboard
# For standard mode
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# For vi mode
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# ==========================
# Key Bindings
# ==========================

# Split panes in current directory
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ==========================
# TPM Plugins
# ==========================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum settings
set -g @continuum-restore 'on'

# Initialize TPM (must be at the bottom)
run '~/.tmux/plugins/tpm/tpm'
